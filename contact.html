<section class="section">

        <div class="contact-info__item">
          <div class="contact-info__icon">👤</div>
          <div>
            <div class="contact-info__label">Maintained By</div>
            <div class="contact-info__value">Sachin Balu Khaire</div>
          </div>
        </div>
        <div class="contact-info__item">
          <div class="contact-info__icon">🏛️</div>
          <div>
            <div class="contact-info__label">Institution</div>
            <div class="contact-info__value">IIT Guwahati · Biomedical Sciences &amp; Engineering</div>
          </div>
        </div>

        <div class="contact-socials">
          <a href="https://www.linkedin.com/in/skhaire2812" target="_blank" rel="noopener" class="social-btn" aria-label="LinkedIn">

        </div>
      </div>

      <div class="reveal reveal--right">
        <form class="form" id="contactForm" action="https://formsubmit.co/khairesachin101@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="New message from Cranial3DLab contact form">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://khairesachin101-rock.github.io/cranial3dlab-Sachin-Khaire/contact.html?sent=true">
          <div class="form-row">
            <div class="field">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="field">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option>General Question</option>
              <option>Case Study Inquiry</option>
              <option>Collaboration / Research</option>
              <option>Report an Issue</option>
            </select>
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
          </div>
          <button type="submit" class="btn btn--primary" style="align-self:flex-start">Send Message →</button>
        </form>
      </div>

    </div>
  </div>

<div id="footer"></div>
