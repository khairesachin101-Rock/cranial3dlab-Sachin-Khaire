<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive 3D viewer for cranial plate models, molds, and skull reconstructions.">
  <title>3D Gallery — Cranial3DLab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    .mv-card { position: relative; }
    .mv-card__badge {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      font-family: var(--mono); font-size: .65rem; letter-spacing: .08em; text-transform: uppercase;
      background: rgba(11,31,58,.75); color: #fff; padding: .35rem .7rem; border-radius: 2rem;
      backdrop-filter: blur(6px);
    }
    .mv-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,.45); gap: .5rem; text-align: center; padding: 1rem;
    }
    .mv-empty .icon { font-size: 2.5rem; opacity: .5; }
    .mv-empty small { font-family: var(--mono); font-size: .68rem; }
  </style>
</head>
<body>
<div id="nav"></div>
<section class="section" aria-label="Static reference renders">
  <div class="container">
    <div class="section-header reveal">
      <span class="tag">🖼️ Reference Renders</span>
      <h2>Static Captures From the Build Process</h2>
    </div>
    <div id="galleryMain" style="border-radius:16px;overflow:hidden;margin-bottom:1.5rem;aspect-ratio:16/9;background:var(--surface)">
      <img src="images/C1.png" alt="Cranial plate fitted on skull model" id="galleryMainImg" style="width:100%;height:100%;object-fit:contain">
    </div>
    <div class="gallery-group gallery-thumb-row">
      <!-- Case 01 -->
      <div class="gallery-thumb active" data-src="images/C1.png"><img src="images/C1.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/Case_01.png"><img src="images/Case_01.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/C0.png"><img src="images/C0.png" alt="thumb"></div>
      <!-- Case 02 -->
      <div class="gallery-thumb" data-src="images/c10.png"><img src="images/c10.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/c11.png"><img src="images/c11.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/c12.png"><img src="images/c12.png" alt="thumb"></div>
      <!-- Case 03 -->
      <div class="gallery-thumb" data-src="images/C4.png"><img src="images/C4.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/C6.png"><img src="images/C6.png" alt="thumb"></div>
      <div class="gallery-thumb" data-src="images/C5.png"><img src="images/C5.png" alt="thumb"></div>
    </div>
  </div>
</section>
<div id="footer"></div>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
  // Re-point #galleryMain image (main.js targets #galleryMain as <img>; here it's a wrapper div)
  document.querySelectorAll('.gallery-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      const img = document.getElementById('galleryMainImg');
      if (img && thumb.dataset.src) img.src = thumb.dataset.src;
    });
  });
</script>
</body>
</html>
